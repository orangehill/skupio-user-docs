name: ci

on:
  pull_request:
    paths:
      - 'user-docs/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'
  push:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: leak-check (no env-var names, no internal class paths)
        run: npm run leak-check
      - name: validate:frontmatter (Skupio convention)
        run: npm run validate:frontmatter
